<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Features</title>
    <style>
      #bgVideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}
        /* Reset */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

/* Body */
body {
  background: whitesmoke;
  font-family: sans-serif;
  overflow-x: hidden;
}

/* Section (no background) */
.carousel-section {
  width: 100%;
  padding: 30px 0;
}

/* Row container */
.carousel-outer {
  width: 75%;
  margin: auto;
  overflow: hidden;
  position: relative;
}

/* Soft fade edges */
.carousel-outer::before,
.carousel-outer::after {
  content: '';
  position: absolute;
  top: 0;
  bottom: 0;
  width: 100px;
  z-index: 5;
  pointer-events: none;
}

.carousel-outer::before {
  left: 0;
  background: linear-gradient(to right, #0d0d0f, transparent);
}

.carousel-outer::after {
  right: 0;
  background: linear-gradient(to left, #0d0d0f, transparent);
}

/* Track */
.carousel-track {
  display: flex;
  gap: 22px;                  /* compact spacing */
  width: max-content;
  animation: scrollRow 20s linear infinite;
}

/* Pause on hover */
.carousel-outer:hover .carousel-track {
  animation-play-state: paused;
}

/* Infinite scroll */
@keyframes scrollRow {
  0%   { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}

/* Logo wrapper */
.card-wrap {
  width: 60px;               /* smaller size */
  height: 60px;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Logo image */
.card-wrap img {
  width: 100%;
  height: 100%;
  object-fit: contain;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
  transition: transform 0.25s ease;
}

/* Hover effect */
.card-wrap:hover img {
  transform: scale(1.12);
}

.heading {
  text-align: center;
  margin-top: -5px;
}

.heading h2 {
  font-size: 4rem;
  font-family: 'Orbitron', 'Montserrat', sans-serif; /* futuristic font */
  font-weight: 700;

  /* Maximum spacing between letters */
  letter-spacing: 12px;

  /* Bright animated gradient */
  background: linear-gradient(90deg, #ff00ff, #00ffff, #00ff88, #ffea00);
  background-size: 300%;

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  /* Smooth animation instead of pulse */
  animation: gradientMove 4s linear infinite, zoomIn 1.5s ease forwards;
}

/* Moving gradient animation */
@keyframes gradientMove {
  0% { background-position: 0%; }
  100% { background-position: 300%; }
}

/* Clean zoom entry animation */
@keyframes zoomIn {
  0% {
    transform: scale(0.5);
    opacity: 0;
    letter-spacing: 25px;
  }
  100% {
    transform: scale(1);
    opacity: 1;
    letter-spacing: 12px;
  }
}
.heading h3 {
  margin-top: 20px;
  font-size: 1.5rem;
  font-family: 'Montserrat', sans-serif;
  color: #ffffffcc;
  letter-spacing: 2px;

  overflow: hidden;

  /* REMOVE this */
  /* white-space: nowrap; */

  white-space: normal;   /* allow wrapping */
  text-align: center;

  width: 100%;
}
@media (max-width: 768px) {
  .heading h3 {
    white-space: normal;
    width: 100%;
    animation: none;   /* stop typing effect */
  }
}

/* smooth continuous typing → reset */
@keyframes typing {
  0% { width: 0 }
  100% { width: 100% }
}

.heading h3:last-child {
  font-weight: bolder;
  font-size: 0.7rem;
  opacity: 0.7;
}

.logo {
  text-align: center;   /* center horizontally */
  margin-bottom: 0;
}

.logo img {
  width: 400px;         /* medium size */
  height: auto;
  display: inline-block;
}
    </style>
<script>
document.addEventListener("DOMContentLoaded", function () {

  const logos = [
    {src: "logos/emailjs.png"},
    {src: "logos/HTML.png"},
    {src: "logos/Javascript.png"},
    {src: "logos/react.png"},
    {src: "logos/CSS.png"},
    {src: "logos/github.png"},
    {src: "logos/gpt.png"},
    {src: "logos/gemini.png"},
    {src: "logos/canva.png"},
    {src: "logos/claude.png"},
    {src: "logos/figma.png"},   
    {src: "logos/youtube.png"},
    {src: "logos/copilot.png"},
    {src: "logos/spotify.png"},
  ];

  const track = document.getElementById('track');

  function makeLogo(s) {
    const wrap = document.createElement('div');
    wrap.className = 'card-wrap';

    const img = document.createElement('img');
    img.src = s.src;

    wrap.appendChild(img);
    return wrap;
  }


  for (let i = 0; i < 4; i++) {
    logos.forEach(l => track.appendChild(makeLogo(l)));
  }

});
</script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&display=swap" rel="stylesheet">
</head>
<body>
  <video autoplay muted loop id="bgVideo">
  <source src="background.mp4" type="video/mp4">
</video>
      <header class="hero">
    <div class="divider"></div>
  </header>

  <section class="carousel-section">
    <div class="carousel-outer">
      <div class="carousel-track" id="track"></div>
    </div>
  </section>
  <section class="logo">
    <img src="download-removebg-preview.png" alt="">
  </section>
  <section class="heading">
    <h2>Wavify</h2>
    <h3>Because every mood sounds different.</h3>
    <h3>V 2.0</h3>
  </section>
</body>
</html>
