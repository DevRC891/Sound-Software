<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responsive Contact Page</title>
  <script src="https://kit.fontawesome.com/c32adfdcda.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

    * {
      padding: 0;
      margin: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url('https://images.unsplash.com/photo-1492724441997-5dc865305da7');
      background-size: cover;
      background-position: center;
    }

    section {
      padding: 80px 20px;
      flex: 1;
    }

    .container {
      max-width: 1100px;
      margin: auto;
    }

    .section-header {
      margin-bottom: 60px;
      text-align: center;
    }

    .section-header h2 {
      color: #FFF;
      font-size: 3em;
    }

    .section-header p {
      color: #ddd;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 30px;
    }

    .contact-info {
      flex: 1;
      min-width: 280px;
    }

    .contact-form {
      flex: 2;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
    }

    .contact-info-item {
      display: flex;
      margin-bottom: 25px;
    }

    

    .contact-info-content {
      margin-left: 15px;
    }

    .contact-info-content h4 {
      color: #1da9c0;
    }

    .contact-info-content p {
      color: #fff;
    }

    .input-box input,
    .input-box textarea {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-bottom: 2px solid #333;
      outline: none;
    }

    .input-box input[type="submit"] {
      background: #00bcd4;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    .input-box input[type="submit"]:hover {
      background: transparent;
      color: #00bcd4;
      border: 1px solid #00bcd4;
    }

    /* Footer */
footer {
  background: #0d0d0d;
  color: #fff;
  padding: 40px 20px 20px;
  text-align: center;
}

.footer-content {
  max-width: 500px;
  margin: auto;
}

.footer-content img {
  width: 160px;  
  height: 160px;
  
  object-fit: cover;
  margin-bottom: 15px;
}

/* Name */
.footer-content h3 {
  font-size: 22px;
  margin-bottom: 15px;
}

/* Social bar */
.social-bar {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin-top: 10px;
}

/* Icons */
.social-bar a {
  width: 45px;
  height: 45px;
  
  display: flex;
  align-items: center;
  justify-content: center;
  transition: 0.3s ease;
}

.social-bar a img {
  width: 20px;
  height: 20px;
}

/* Hover */
.social-bar a:hover {
  background: #00bcd4;
  transform: translateY(-5px);
}

/* Bottom text */
.footer-bottom {
  margin-top: 20px;
  font-size: 14px;
  color: #aaa;
}

    /* Typewriter animation */
    .typewriter {
      overflow: hidden;
      border-right: .15em solid #00bcd4;
      white-space: nowrap;
      margin: 0 auto;
      letter-spacing: .1em;
      animation: typing 3s steps(20, end), blink .75s step-end infinite;
    }

    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }

    @keyframes blink {
      from, to { border-color: transparent }
      50% { border-color: #00bcd4 }
    }

    /* Separate bar for social icons */
    .social-bar {
      margin-top: 20px;
      padding: 10px;
    
    }

    .social-bar a img {
      width: 25px; /* smaller icons */
      margin: 0 10px;
      vertical-align: middle;
    }

    @media (max-width: 768px) {
      .row {
        flex-direction: column;
      }

      .section-header h2 {
        font-size: 2em;
      }
    }
  

    /* Scroll Animations */
    .hidden {
      opacity: 0;
      transform: translateY(50px);
      transition: all 0.8s ease;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>

<body>

<section class="hidden">
  <div class="container">
    <div class="section-header">
      <h2>Meet the Creator</h2>
      <p>Full-Stack Developer | Frontend & Backend</p>
    </div>

    <div class="row">

      <div class="contact-info hidden">
        <div class="contact-info-item">
          <div class="contact-info-icon"></div>
          <div class="contact-info-content">
            <h4>Address</h4>
            <p>Vellore - 632014 (T.N)</p>
          </div>
        </div>

        </div>

        <div class="contact-info-item">
          <div class="contact-info-icon"></div>
          <div class="contact-info-content">
            <h4>Email</h4>
            <p>rupayanchattaraj@gmail.com</p>
          </div>
        </div>
      </div>

      <div class="contact-form hidden">
        <form>
          <h2>Send Message</h2>
          <div class="input-box">
            <input type="text" name="user_name" id="name" placeholder="Full Name" required>
          </div>

          <div class="input-box">
            <input type="text" name="user_name" id="email" placeholder="Email" required>
          </div>

          <div class="input-box">
            <textarea name="message" id="message"placeholder="Tell us your suggestions.." required></textarea>
          </div>

          <div class="input-box">
            <input type="submit" value="Send">
          </div>
        </form>
      </div>

    </div>
  </div>
</section>

<footer class="hidden">
  <div class="footer-content">
    
    <h3>Rupayan Chattaraj</h3>
    <h3>------------</h3>
    <img src="me.jpeg" alt="Rupayan Chattaraj">
    <h3>------------</h3>
    <div class="social-bar">
      <a href="https://www.linkedin.com/in/rupayanchattaraj/"><img src="linkedin-removebg-preview.png"></a>
      <a href="https://www.instagram.com/rushooo___/"><img src="instagram-Photoroom.png"></a>
    </div>

  </div>
</footer>



<script>
  // Scroll animation
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('show');
      }
    });
  });

  document.querySelectorAll('.hidden').forEach(el => observer.observe(el));

  // Initialize EmailJS ONLY ONCE
  (function () {
    emailjs.init("RmnauhFBq3Gxd7Ujo"); // your public key
  })();

  // Form handling
  window.onload = function () {
    const form = document.querySelector("form");

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();

      // ✅ VALIDATION
      const nameRegex = /^[A-Za-z ]{5,}$/;
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!nameRegex.test(name)) {
        alert("Name must be at least 5 letters and contain only alphabets.");
        return;
      }

      if (!emailRegex.test(email)) {
        alert("Enter a valid email address.");
        return;
      }

      if (message.length < 5) {
        alert("Message must be at least 5 characters.");
        return;
      }

      // 1️⃣ Send message to YOU
      emailjs.send("service_jphufyv", "template_yfjshtq", {
        name: name,
        email: email,
        message: message
      });

      // 2️⃣ Auto reply to USER (use DIFFERENT template in EmailJS)
      emailjs.send("service_jphufyv", "template_768155o", {
        to_email: email,
        to_name: name
      })
      .then(() => {
        alert("Email sent successfully!");
        form.reset();
      })
      .catch((error) => {
        alert("Failed to send email");
        console.error(error);
      });

    });
  };
</script>
</script>

</body>
</html>
