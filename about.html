/* Header styling */
.section-header h2 {

/* Slide + Fade animation */
@keyframes slideFade {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Subtle glow effect */
@keyframes glow {
    from {
        text-shadow: 0 0 5px #aaa, 0 0 10px #aaa;

/* Typewriter container (UNCHANGED) */
.typewriter {
  display: inline-block;
  max-width: 100%;

  white-space: nowrap;      /* force single line */
  overflow: hidden;         /* hide overflow */
  text-overflow: ellipsis;  /* optional: adds ... if too long */

  font-size: clamp(0.5rem, 2vw, 1.5rem);  /* shrink for small screens */
  letter-spacing: 0.02rem;

  text-align: center;
}

/* Cursor blinking */
@keyframes blink {
    50% { border-color: transparent; }
}

.typewriter {
    animation: blink 0.7s infinite;

    /* Footer */
footer {
  position: relative;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  color: #000;
  padding: 40px 20px 20px;
  text-align: center;
  border-radius: 20px;
  overflow: hidden;
}

/* 🔥 Gradient glowing border */
footer::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 2px; /* thickness of border */

  background: linear-gradient(
    45deg,
    #ff6ec4,
    #7873f5,
    #00f2fe,
    #4facfe,
    #ff6ec4
  );

  border-radius: 20px;

  /* Magic for border effect */
  -webkit-mask: 
    linear-gradient(#fff 0 0) content-box, 
    linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  animation: borderGlow 4s linear infinite;
}

/* Smooth moving gradient */
@keyframes borderGlow {
  0% {
    background-position: 0% 50%;
  }
  100% {
    background-position: 300% 50%;
  }
}

    /* CLOCK CONTAINER */
.clock {
  width: 250px;
  height: 250px;
  border-radius: 50%;
  position: relative;
  margin: 40px auto;

  background: rgba(255, 255, 255, 0.05);
  backdrop-filter: blur(12px);

}

/* CENTER DOT */
.clock .center {
  width: 14px;
  height: 14px;
  background: gold;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 12px blueviolet;
  z-index: 10;
}

/* HANDS */
.clock .hand {
  position: absolute;
  bottom: 50%;
  left: 50%;
  transform-origin: bottom;
  transform: translateX(-50%) rotate(0deg);
  border-radius: 10px;
}

.clock .hour {
  width: 6px;
  height: 65px;
  background:grey;
}

.clock .minute {

}

.clock .second {

}

/* Smooth transition */

<script>
  const text = "Full-Stack Developer | Frontend & Backend";
let index = 0;

function typeEffect() {
    if (index < text.length) {
        document.getElementById("typeText").innerHTML += text.charAt(index);
        index++;
        setTimeout(typeEffect, 80);
    } else {
        setTimeout(() => {
            document.getElementById("typeText").innerHTML = "";
            index = 0;
            typeEffect();
        }, 1500);
    }
}

typeEffect();
 
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('show');
      }
    });
  });

  document.querySelectorAll('.hidden').forEach(el => observer.observe(el));

  
  (function () {
    emailjs.init("RmnauhFBq3Gxd7Ujo"); 
  })();

  
  window.onload = function () {
    const form = document.querySelector("form");

    form.addEventListener("submit", function (event) {
      event.preventDefault();

      const name = document.getElementById("name").value.trim();
      const email = document.getElementById("email").value.trim();
      const message = document.getElementById("message").value.trim();

      
      const nameRegex = /^[A-Za-z ]{5,}$/;
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

      if (!nameRegex.test(name)) {
        alert("Name must be at least 5 letters and contain only alphabets.");
        return;
      }

      if (!emailRegex.test(email)) {
        alert("Enter a valid email address.");
        return;
      }

      if (message.length < 5) {
        alert("Message must be at least 5 characters.");
        return;
      }

    
      emailjs.send("service_jphufyv", "template_yfjshtq", {
        name: name,
        email: email,
        message: message
      });

      
      emailjs.send("service_jphufyv", "template_768155o", {
        to_email: email,
        to_name: name
      })
      .then(() => {
        alert("Email sent successfully!");
        form.reset();
      })
      .catch((error) => {
        alert("Failed to send email");
        console.error(error);
      });

    });
  };
  
  const clock = document.getElementById("clock");

/* Create numbers dynamically */
for (let i = 1; i <= 12; i++) {
  const number = document.createElement("div");
  number.className = "number";
  number.innerText = i;

  const angle = i * 30; // 360/12
const rect = clock.getBoundingClientRect();
const center = rect.width / 2;
const radius = center * 0.75; // perfect proportional spacing

const x = center + radius * Math.sin(angle * Math.PI / 180);
const y = center - radius * Math.cos(angle * Math.PI / 180);

  number.style.left = `${x}px`;
  number.style.top = `${y}px`;

  clock.appendChild(number);
}

/* Clock logic */
const hour = document.getElementById('hour');
const minute = document.getElementById('minute');
const second = document.getElementById('second');

function updateClock() {
  const now = new Date();

  const hrs = now.getHours();
  const mins = now.getMinutes();
  const secs = now.getSeconds();

  const hourDeg = (hrs % 12) * 30 + mins * 0.5;
  const minuteDeg = mins * 6 + secs * 0.1;
  const secondDeg = secs * 6;

  hour.style.transform = `translateX(-50%) rotate(${hourDeg}deg)`;
  minute.style.transform = `translateX(-50%) rotate(${minuteDeg}deg)`;
  second.style.transform = `translateX(-50%) rotate(${secondDeg}deg)`;
}

setInterval(updateClock, 1000);
updateClock();
const btn = document.querySelector(".glass-btn");
let timeout;

/* Show button */
function showBtn() {
  btn.classList.remove("hidden");

  clearTimeout(timeout);
  timeout = setTimeout(() => {
    btn.classList.add("hidden");
  }, 2000); // hide after 2s idle
}

/* Detect activity */
["mousemove", "keydown", "scroll", "touchstart"].forEach(event => {
  window.addEventListener(event, showBtn);
});

/* Start hidden initially */
btn.classList.add("hidden");
</script>
